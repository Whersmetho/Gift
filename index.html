<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Iris 🌼</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="musica.mp3" type="audio/mpeg">
    </audio>

    <section id="intro" class="section">
        <div class="card">
            <h1>Iris 💛</h1>
            <p>Hice algo para ti. No es un regalo común. Es solo una pequeña parte de lo que siento por ti.</p>
            <button onclick="startStory()">Abrir</button>
        </div>
    </section>

    <section id="story" class="section hidden">
        <div class="card">
            <p id="storyText"></p>
            <button id="nextBtn">Continuar</button>
        </div>
    </section>

    <section id="letter" class="section hidden">
        <div class="card">
            <div id="counter"></div> 
            <p id="letterText"></p>
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
